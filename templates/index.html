<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
</head>
<body>

<h1>Task Manager</h1>

<form method="POST" action="/add">
    <input name="task" placeholder="New task">
    <button type="submit">Add</button>
</form>

<ul>
    {% for task in tasks %}
        <li>
            {{ task }}
            <a href="/delete/{{ loop.index0 }}">Delete</a>
        </li>
    {% endfor %}
</ul>

</body>
</html>
